<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Memory Game ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ffd1dc,#ff9aa2);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
}

h1{
    color:white;
    margin-bottom:10px;
    text-shadow:2px 2px 8px rgba(0,0,0,.2);
}

#moves{
    color:white;
    font-size:18px;
    margin-bottom:20px;
}

.game-board{
    width:90%;
    max-width:500px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

.card{
    aspect-ratio:1;
    position:relative;
    cursor:pointer;
    transform-style:preserve-3d;
    transition:transform .5s;
}

.card.flip{
    transform:rotateY(180deg);
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    backface-visibility:hidden;
    font-size:42px;
}

.front{
    background:white;
    color:#ff4d79;
    box-shadow:0 5px 12px rgba(0,0,0,.15);
}

.back{
    background:#ff4d79;
    color:white;
    transform:rotateY(180deg);
}

#winMessage{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    display:none;
    align-items:center;
    justify-content:center;
}

.popup{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:350px;
}

.popup h2{
    color:#ff4d79;
    margin-bottom:15px;
}

.popup p{
    color:#444;
    margin-bottom:20px;
    line-height:1.5;
}

button{
    padding:10px 22px;
    border:none;
    border-radius:25px;
    background:#ff4d79;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.floating-heart{
    position:fixed;
    font-size:24px;
    animation:floatUp 4s linear infinite;
    opacity:.8;
    pointer-events:none;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{opacity:1;}
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}
</style>
</head>
<body>

<h1>💖 Love Memory Game 💖</h1>
<div id="moves">Moves: 0</div>

<div class="game-board" id="board"></div>

<div id="winMessage">
    <div class="popup">
        <h2>You Won! ❤️</h2>
        <p>
            Every card found is like every memory we've created together.<br><br>
            And my favorite memory is having you in my life. 💕
        </p>
        <button onclick="restartGame()">Play Again</button>
    </div>
</div>


<script>
const symbols = ["❤️","🌹","💍","🧸","💕","💖","🌙","✨"];
let cards = [...symbols, ...symbols];

const board = document.getElementById("board");
const movesText = document.getElementById("moves");
const winMessage = document.getElementById("winMessage");

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let moves = 0;
let matched = 0;

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function createBoard(){
    board.innerHTML="";
    shuffle(cards);

    cards.forEach(symbol=>{
        const card=document.createElement("div");
        card.classList.add("card");
        card.dataset.symbol=symbol;

        card.innerHTML=`
            <div class="front">❓</div>
            <div class="back">${symbol}</div>
        `;

        card.addEventListener("click",flipCard);
        board.appendChild(card);
    });
}

function flipCard(){
    if(lockBoard) return;
    if(this===firstCard) return;

    this.classList.add("flip");

    if(!firstCard){
        firstCard=this;
        return;
    }

    secondCard=this;
    moves++;
    movesText.textContent="Moves: " + moves;

    checkMatch();
}

function checkMatch(){
    const isMatch=firstCard.dataset.symbol===secondCard.dataset.symbol;

    if(isMatch){
        firstCard.removeEventListener("click",flipCard);
        secondCard.removeEventListener("click",flipCard);

        matched++;

        resetTurn();

        if(matched===symbols.length){
            setTimeout(()=>{
                winMessage.style.display="flex";
            },500);
        }
    }else{
        lockBoard=true;

        setTimeout(()=>{
            firstCard.classList.remove("flip");
            secondCard.classList.remove("flip");
            resetTurn();
        },800);
    }
}

function resetTurn(){
    [firstCard,secondCard]=[null,null];
    lockBoard=false;
}

function restartGame(){
    moves=0;
    matched=0;
    movesText.textContent="Moves: 0";
    winMessage.style.display="none";
    firstCard=null;
    secondCard=null;
    lockBoard=false;
    createBoard();
}

createBoard();

// Floating hearts animation
setInterval(()=>{
    const heart=document.createElement("div");
    heart.className="floating-heart";
    heart.innerHTML=Math.random()>0.5 ? "❤️" : "💕";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*2)+"s";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),5000);
},700);


</script>

</body>
</html>
